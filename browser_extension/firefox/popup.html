<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
        }
        h2 { 
            font-size: 16px; 
            color: #2c3e50; 
            margin: 0 0 10px 0;
            font-weight: 600;
        }
        .status { 
            color: #27ae60; 
            font-weight: bold; 
            font-size: 14px;
            margin-bottom: 15px;
        }
        .stats {
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            margin-bottom: 15px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 12px;
        }
        .stat-label { color: #6c757d; }
        .stat-value { font-weight: bold; color: #495057; }
        button {
            width: 100%;
            padding: 8px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        button:hover {
            background: #0056b3;
        }
        .footer {
            font-size: 11px;
            color: #6c757d;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>📊 Activity Tracker</h2>
    <p class="status">🟢 Tracking active tabs</p>
    
    <div class="stats">
        <div class="stat-item">
            <span class="stat-label">Extension Status:</span>
            <span class="stat-value">Active</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Server:</span>
            <span class="stat-value">localhost:5001</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Tracking:</span>
            <span class="stat-value">Time & URLs</span>
        </div>
    </div>
    
    <button id="check">Sync Now</button>
    <div class="footer">Click extension icon to view this popup</div>
    
    <script src="popup.js"></script>
</body>
</html>
